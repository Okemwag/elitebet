name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  maven:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          check-latest: true
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          ./mvnw --version

      - name: Test
        run: ./mvnw -B -ntp test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          check-latest: true
          cache: maven

      - name: Verify with Testcontainers
        run: ./mvnw -B -ntp verify

  compose:
    name: Compose Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate base Compose stack
        run: docker compose config --quiet

      - name: Validate all Compose profiles
        run: docker compose --profile auth --profile rabbitmq --profile kafka --profile monitoring --profile app config --quiet

      - name: Start source-of-truth dependencies
        run: docker compose up -d --build postgres redis

      - name: Check PostgreSQL readiness
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T postgres pg_isready -U elitebet -d elitebet; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs postgres
          exit 1

      - name: Check Redis readiness
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T redis redis-cli -a redis_dev_password ping | grep -q PONG; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs redis
          exit 1

      - name: Show running services
        run: docker compose ps

      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - maven
      - integration
      - compose

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          pull: true
          tags: elitebet/app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
